<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDMH Travel Ticket System</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for Browser Execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <!-- Firebase SDK Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // Global configuration access
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Attach to window for React access
        window.db = db;
        window.auth = auth;
        window.fbActions = { 
            collection, doc, addDoc, updateDoc, onSnapshot, query, orderBy, 
            signInAnonymously, signInWithCustomToken, onAuthStateChanged 
        };

        // RULE 3: Auth Before Queries
        const initAuth = async () => {
            try {
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }
                // Only signal ready after auth is successful
                window.dispatchEvent(new Event('firebase-ready'));
            } catch (error) {
                console.error("Auth failed:", error);
            }
        };

        initAuth();
    </script>

    <script type="text/babel">
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tdmh-travel-system';
        const ADMIN_PASSWORD = "TDMH2024";
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('request');
            const [user, setUser] = useState(null);
            const [requests, setRequests] = useState([]);
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [message, setMessage] = useState(null);
            const [isFirebaseReady, setIsFirebaseReady] = useState(false);

            // Auth Listener
            useEffect(() => {
                const { auth, fbActions } = window;
                if (!fbActions) return;
                
                const unsubscribe = fbActions.onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) setIsFirebaseReady(true);
                });
                return () => unsubscribe();
            }, []);

            // Data Listener - Guarded by User Auth (RULE 3)
            useEffect(() => {
                if (!user || !isFirebaseReady) return;
                
                const { db, fbActions } = window;
                // Path strictly follows RULE 1
                const q = fbActions.query(
                    fbActions.collection(db, 'artifacts', appId, 'public', 'data', 'tickets'), 
                    fbActions.orderBy('createdAt', 'desc')
                );

                const unsubscribe = fbActions.onSnapshot(q, 
                    (snapshot) => {
                        setRequests(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                    },
                    (error) => {
                        console.error("Firestore error:", error);
                    }
                );

                return () => unsubscribe();
            }, [user, isFirebaseReady]);

            const showToast = (t) => { setMessage(t); setTimeout(() => setMessage(null), 3000); };

            const handleLogin = () => {
                if (passwordInput === ADMIN_PASSWORD) { setIsAuthorized(true); setPasswordInput(''); }
                else showToast("Incorrect Password");
            };

            const downloadCSV = () => {
                if (requests.length === 0) return showToast("No data to export");
                const headers = ["Staff Name", "Department", "Date", "Time", "Purpose", "Type", "Status", "Driver", "Vehicle", "Odo Start", "Odo End", "Security", "Completed At"];
                const rows = requests.map(r => [
                    `"${r.staffName || ''}"`, `"${r.department || ''}"`, r.date || '', r.time || '', `"${r.purpose || ''}"`, r.transportType || '', r.status || '', `"${r.driver || ''}"`, `"${r.vehicle || ''}"`, r.odoStart || '', r.odoEnd || '', `"${r.securityName || ''}"`, r.completedAt || ''
                ]);
                const csvContent = [headers, ...rows].map(e => e.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.setAttribute("href", URL.createObjectURL(blob));
                link.setAttribute("download", `TDMH_Report_${new Date().toLocaleDateString()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const Nav = () => (
                <nav className="bg-blue-900 text-white p-4 shadow-md sticky top-0 z-50">
                    <div className="max-w-4xl mx-auto flex justify-between items-center">
                        <div className="font-bold flex items-center gap-2">TDMH TRAVEL</div>
                        <div className="flex gap-2 text-[10px] md:text-xs">
                            <button onClick={() => setView('request')} className={`px-2 py-1 rounded ${view==='request'?'bg-blue-700':''}`}>Request</button>
                            <button onClick={() => setView('track')} className={`px-2 py-1 rounded ${view==='track'?'bg-blue-700':''}`}>Track</button>
                            <button onClick={() => {setView('admin'); setIsAuthorized(false)}} className={`px-2 py-1 rounded ${view==='admin'?'bg-blue-700':''}`}>Admin</button>
                            <button onClick={() => {setView('security'); setIsAuthorized(false)}} className={`px-2 py-1 rounded ${view==='security'?'bg-blue-700':''}`}>Security</button>
                        </div>
                    </div>
                </nav>
            );

            if (!user) {
                return <div className="flex items-center justify-center min-h-screen text-blue-900 font-bold">Authenticating...</div>;
            }

            if (view === 'request') {
                return (
                    <div>
                        <Nav />
                        <div className="p-4 max-w-xl mx-auto mt-4">
                            <div className="bg-white rounded-xl shadow-lg p-6 border border-gray-100">
                                <h2 className="text-xl font-bold text-blue-800 mb-6 text-center">Travel Ticket Request</h2>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    const data = Object.fromEntries(fd.entries());
                                    const { db, fbActions } = window;
                                    await fbActions.addDoc(fbActions.collection(db, 'artifacts', appId, 'public', 'data', 'tickets'), {
                                        ...data,
                                        status: 'Pending',
                                        createdAt: new Date().toISOString(),
                                        userId: user.uid
                                    });
                                    showToast("Submitted Successfully");
                                    e.target.reset();
                                    setView('track');
                                }} className="space-y-4">
                                    <input name="staffName" placeholder="Staff Name" required className="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                                    <input name="department" placeholder="Department" required className="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                                    <div className="grid grid-cols-2 gap-2">
                                        <input name="date" type="date" required className="border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                                        <input name="time" type="time" required className="border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <textarea name="purpose" placeholder="Purpose & Destination" required className="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none h-24" />
                                    <select name="transportType" className="w-full border p-2 rounded bg-white">
                                        <option value="Staff">Staff Transport</option>
                                        <option value="Patient">Patient Transport</option>
                                    </select>
                                    <button className="w-full bg-blue-700 text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition shadow-md">Submit Request</button>
                                </form>
                            </div>
                        </div>
                        {message && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black text-white px-4 py-2 rounded-full z-50">{message}</div>}
                    </div>
                );
            }

            if ((view === 'admin' || view === 'security') && !isAuthorized) {
                return (
                    <div>
                        <Nav />
                        <div className="flex items-center justify-center mt-20 p-4">
                            <div className="bg-white p-8 rounded-xl shadow-xl w-full max-w-sm text-center border border-gray-100">
                                <h2 className="text-xl font-bold mb-4 uppercase tracking-wider text-blue-900">Restricted Access</h2>
                                <input 
                                    type="password" 
                                    placeholder="Password" 
                                    className="w-full border p-3 rounded mb-4 text-center focus:ring-2 focus:ring-blue-500 outline-none" 
                                    value={passwordInput}
                                    onChange={e => setPasswordInput(e.target.value)} 
                                    onKeyDown={e => e.key === 'Enter' && handleLogin()}
                                />
                                <button onClick={handleLogin} className="w-full bg-blue-800 text-white py-3 rounded font-bold hover:bg-black transition">Unlock Portal</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div>
                    <Nav />
                    <div className="p-4 max-w-2xl mx-auto">
                        <div className="flex justify-between items-end mb-6">
                            <div>
                                <h2 className="text-xl font-black uppercase tracking-tighter text-blue-900">{view} Panel</h2>
                                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Live System Feed</p>
                            </div>
                            {view === 'admin' && (
                                <button onClick={downloadCSV} className="bg-green-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest flex items-center gap-1 shadow hover:bg-green-700 transition">
                                    Export CSV
                                </button>
                            )}
                        </div>

                        {view === 'admin' && (
                            <div className="grid grid-cols-3 gap-2 mb-6">
                                <div className="bg-white p-3 rounded-xl border border-gray-100 shadow-sm text-center">
                                    <div className="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Pending</div>
                                    <div className="text-xl font-black text-yellow-600">{requests.filter(r => r.status === 'Pending').length}</div>
                                </div>
                                <div className="bg-white p-3 rounded-xl border border-gray-100 shadow-sm text-center">
                                    <div className="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Active</div>
                                    <div className="text-xl font-black text-blue-600">{requests.filter(r => r.status === 'Approved' || r.status === 'On Travel').length}</div>
                                </div>
                                <div className="bg-white p-3 rounded-xl border border-gray-100 shadow-sm text-center">
                                    <div className="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Total</div>
                                    <div className="text-xl font-black text-gray-800">{requests.length}</div>
                                </div>
                            </div>
                        )}

                        {requests.length === 0 ? (
                            <div className="text-center py-20 text-gray-400 italic bg-white rounded-xl border border-dashed border-gray-300">No tickets found in the database.</div>
                        ) : requests.map(r => (
                            <div key={r.id} className="bg-white p-4 rounded-xl shadow-sm mb-3 border-l-4 border-blue-500 hover:shadow-md transition">
                                <div className="flex justify-between font-bold text-blue-900">
                                    <span className="text-base">{r.staffName}</span>
                                    <span className={`text-[9px] px-2 py-0.5 rounded-full uppercase tracking-tighter ${
                                        r.status === 'Completed' ? 'bg-green-100 text-green-700' :
                                        r.status === 'Approved' ? 'bg-blue-100 text-blue-700' :
                                        r.status === 'On Travel' ? 'bg-orange-100 text-orange-700 animate-pulse' :
                                        'bg-yellow-100 text-yellow-700'
                                    }`}>{r.status}</span>
                                </div>
                                <div className="text-[10px] text-gray-400 font-bold uppercase tracking-wide">{r.date} @ {r.time} • {r.department}</div>
                                <div className="text-sm mt-2 text-gray-600 font-medium">{r.purpose}</div>
                                
                                {(r.driver || r.vehicle) && (
                                    <div className="mt-2 py-1 px-2 bg-gray-50 rounded text-[10px] flex gap-4 text-gray-500 border border-gray-100">
                                        <span><strong className="text-gray-700 uppercase">Driver:</strong> {r.driver}</span>
                                        <span><strong className="text-gray-700 uppercase">Vehicle:</strong> {r.vehicle}</span>
                                    </div>
                                )}

                                {view === 'admin' && r.status === 'Pending' && (
                                    <button onClick={async () => {
                                        const dr = prompt("Driver Name:");
                                        const vh = prompt("Vehicle (Plate/Model):");
                                        if(dr && vh) {
                                            const { db, fbActions } = window;
                                            await fbActions.updateDoc(fbActions.doc(db, 'artifacts', appId, 'public', 'data', 'tickets', r.id), { 
                                                status: 'Approved', driver: dr, vehicle: vh 
                                            });
                                            showToast("Ticket Approved");
                                        }
                                    }} className="mt-3 bg-blue-600 text-white text-[10px] font-bold px-4 py-2 rounded-lg uppercase tracking-widest hover:bg-blue-700 shadow-sm transition">Approve & Assign</button>
                                )}

                                {view === 'security' && (r.status === 'Approved' || r.status === 'On Travel') && (
                                    <button onClick={async () => {
                                        const odo = prompt(`Enter ${r.status === 'Approved' ? 'Starting' : 'Ending'} Odometer:`);
                                        const sec = prompt("Your Name (Security):");
                                        if(odo && sec) {
                                            const { db, fbActions } = window;
                                            const isDep = r.status === 'Approved';
                                            await fbActions.updateDoc(fbActions.doc(db, 'artifacts', appId, 'public', 'data', 'tickets', r.id), {
                                                status: isDep ? 'On Travel' : 'Completed',
                                                [isDep ? 'odoStart' : 'odoEnd']: odo,
                                                securityName: sec,
                                                completedAt: isDep ? null : new Date().toLocaleString()
                                            });
                                            showToast(isDep ? "Departure Logged" : "Travel Finished");
                                        }
                                    }} className="mt-3 bg-black text-white text-[10px] font-bold px-4 py-2 rounded-lg uppercase tracking-widest hover:bg-gray-800 shadow-sm transition">
                                        Log {r.status === 'Approved' ? 'Departure' : 'Arrival'}
                                    </button>
                                )}
                            </div>
                        ))}
                    </div>
                    {message && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-2 rounded-full z-50 font-bold text-xs shadow-2xl">{message}</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        setInterval(() => { if(window.lucide) window.lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
